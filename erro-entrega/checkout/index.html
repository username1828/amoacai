<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pagar Frete — Costela & Brasa</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/product-page.css">
  <link rel="stylesheet" href="./css/checkout.css">
  <link rel="stylesheet" href="./css/location.css">
  <script>
    window.pixelId = "6a03bd245e88fb37d4bc2b73";
    var a = document.createElement("script");
    a.setAttribute("async", "");
    a.setAttribute("defer", "");
    a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
    document.head.appendChild(a);
  </script>
  <script
    src="https://cdn.utmify.com.br/scripts/utms/latest.js"
    data-utmify-prevent-xcod-sck
    data-utmify-prevent-subids
    async
    defer
  ></script>
</head>
<body class="checkout-page">
  <header class="checkout-topbar">
    <div class="checkout-topbar-inner">
      <button type="button" class="btn-back" onclick="history.back()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="18" height="18"><path d="m12 19-7-7 7-7"></path><path d="M19 12H5"></path></svg>
        VOLTAR
      </button>
      <button type="button" class="header-location" data-flores-location="" aria-label="Trocar localização">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"></path><circle cx="12" cy="10" r="3"></circle></svg>
        <span data-flores-location-text="">Detectando...</span>
      </button>
      <span class="checkout-topbar-title">PAGAR FRETE</span>
    </div>
  </header>

  <div class="checkout-wrap" id="checkout-content"></div>

  <footer class="checkout-footer">
    <p>© 2026 Costela & Brasa</p>
    <p>Todos os direitos reservados</p>
  </footer>

  <script src="location-shared.js"></script>
  <script src="checkout.js"></script>
</body>
</html>
